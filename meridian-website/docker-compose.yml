version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meridian-web
    ports:
      - "3000:3000"
    environment:
      - DATA_ADAPTER=local
      - ENABLE_ADMIN=false
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
